version: '3.8'

services:
  source_db:
    image: postgres:15
    container_name: source_db
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: sourcedb
    ports:
      - "5433:5432"
    volumes:
      - ./sql/source_schema.sql:/docker-entrypoint-initdb.d/1.sql
      - ./sql/seed_data.sql:/docker-entrypoint-initdb.d/2.sql

  destination_db:
    image: postgres:15
    container_name: destination_db
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: destdb
    ports:
      - "5434:5432"
    volumes:
      - ./sql/destination_schema.sql:/docker-entrypoint-initdb.d/1.sql
